<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ты фанат Егора Крида?</title>
  <style>
    :root {
      --bg-1: #0f0c29;
      --bg-2: #302b63;
      --bg-3: #24243e;
      --accent: #ff2d55;
      --ok: #4cd964;
      --bad: #ff3b30;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      color: #f7f7ff;
      background: radial-gradient(circle at 20% 20%, rgba(255,45,85,0.15), transparent 30%),
                  radial-gradient(circle at 80% 80%, rgba(76,217,100,0.12), transparent 30%),
                  linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      overflow: hidden;
    }
    .card {
      width: min(520px, 90vw);
      padding: 28px 28px 32px;
      border-radius: 22px;
      background: rgba(15, 12, 41, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 1;
    }
    h1 {
      margin: 0 0 18px;
      font-size: clamp(26px, 5vw, 34px);
      letter-spacing: 0.3px;
      text-align: center;
    }
    .buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: 14px;
      padding: 14px 26px;
      font-size: 16px;
      font-weight: 600;
      color: #0b0a1a;
      transition: transform 0.08s ease, box-shadow 0.2s ease;
    }
    button:active { transform: scale(0.98); }
    .yes { background: var(--accent); box-shadow: 0 12px 28px rgba(255,45,85,0.35); }
    .no  { background: var(--ok); box-shadow: 0 12px 28px rgba(76,217,100,0.28); }
    .message {
      text-align: center;
      font-size: 18px;
      min-height: 26px;
      line-height: 1.4;
      word-break: break-word;
    }
    .message.bad { color: var(--bad); }
    .message.ok  { color: var(--ok); }
    .fly-sky {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .fly {
      position: absolute;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.45));
      animation: float 5s linear forwards;
      will-change: transform, opacity;
    }
    @keyframes float {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      70%  { opacity: 1; }
      100% { transform: translateY(-140vh) rotate(420deg); opacity: 0; }
    }
  </style>
</head>

    </div>
    <div id="message" class="message"></div>
  </div>

    function clearSky() {
      while (sky.firstChild) sky.removeChild(sky.firstChild);
    }

    function spawnFly(count = 36) {
      clearSky();
      const vw = window.innerWidth;
      for (let i = 0; i < count; i++) {
        const img = document.createElement("img");
        img.className = "fly";
        img.src = flies[Math.floor(Math.random() * flies.length)];
        const size = Math.random() * 60 + 80; // 80–140px
        img.style.width = size + "px";
        img.style.left = Math.random() * vw + "px";
        img.style.bottom = "-120px";
        img.style.animationDuration = (Math.random() * 1.6 + 3.8) + "s";
        img.style.animationDelay = (Math.random() * 0.8) + "s";
        sky.appendChild(img);
        setTimeout(() => img.remove(), 6200);
      }
    }

    function handleYes() {
      msg.textContent = "Ты уебан хуесосный, чтобы твоя семья сдохла";
      msg.className = "message bad";
      if (flies.length) spawnFly(42);
    }

    function handleNo() {
      msg.textContent = "Правильно";
      msg.className = "message ok";
      clearSky();
    }
  </script>
